name: Deploy Website

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ssh.hostcreators.sk >> ~/.ssh/known_hosts

      - name: Deploy files
        run: |
          rsync -avz --delete ./ milanrabcan@rablab.net@ssh.hostcreators.sk:/var/www27/p69000/rablab.net/sub/chroma
